  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 9</title>

  <style>
    button {
      margin: 3px;
    }

    button:hover {
      cursor: pointer;
    }

    #first-num,
    #second-num {
      width: 60px;
    }

    output {
      border: 1px solid gray;
      display: block;
      height: 18px;
      margin-top: 5px;
      padding: 5px;
      width: 240px;
    }

    main {
      width: 800px;
    }

    #error-btns {
      column-gap: 5px;
      display: flex;
      flex-wrap: wrap;
      margin-top: 30px;
      row-gap: 5px;
    }

    #error-btns>* {
      padding: 8px 2px;
      width: 122px;
    }
  </style>
</head>

<body>
  <main>
    <form>
      <fieldset>
        <legend>Error Calculator</legend>
        <input name="first-num" id="first-num" />
        <select name="operator" id="operator">
          <option>+</option>
          <option>-</option>
          <option>*</option>
          <option>/</option>
        </select>
        <input name="second-num" id="second-num" />
        <button id="calculate">Calculate</button>
        <br />
        <output></output>
      </fieldset>
    </form>

    <section id="error-btns">
      <button>Console Log</button>
      <button>Console Error</button>
      <button>Console Count</button>
      <button>Console Warn</button>
      <button>Console Assert</button>
      <button>Console Clear</button>
      <button>Console Dir</button>
      <button>Console dirxml</button>
      <button>Console Group Start</button>
      <button>Console Group End</button>
      <button>Console Table</button>
      <button>Start Timer</button>
      <button>End Timer</button>
      <button>Console Trace</button>
      <button>Trigger a Global Error</button>
    </section>
  </main>

  <script>
    let form = document.querySelector('form');

    class DivideByZeroError extends Error {
  constructor() {
    super("Cannot divide by zero");
    this.name = "DivideByZeroError";
  }
}

    form.addEventListener('submit', e => {
  e.preventDefault();

  try {
    let output = document.querySelector('output');
    let firstNum = document.querySelector('#first-num').value;
    let secondNum = document.querySelector('#second-num').value;
    let operator = document.querySelector('#operator').value;

    if (operator === '/' && secondNum == 0) {
      throw new DivideByZeroError();
    }

    output.innerHTML = eval(`${firstNum} ${operator} ${secondNum}`);
  }
  catch(error) {
    console.error(error.message);
  }
  finally {
    console.log("Calculation completed");
  }
});

    let errorBtns = Array.from(document.querySelectorAll('#error-btns > button'));

    // Start your code here
    // You may move this JS to another file if you wish
errorBtns[0].addEventListener('click', () => console.log("Console log demo"));
errorBtns[1].addEventListener('click', () => console.error("Console error demo"));
errorBtns[2].addEventListener('click', () => console.count("Counter"));
errorBtns[3].addEventListener('click', () => console.warn("Console warning demo"));
errorBtns[4].addEventListener('click', () => console.assert(false, "Assertion failed"));
errorBtns[5].addEventListener('click', () => console.clear());
errorBtns[6].addEventListener('click', () => console.dir(document.body));
errorBtns[7].addEventListener('click', () => console.dirxml(document.body));

errorBtns[8].addEventListener('click', () => {
  console.group("Group Demo");
  console.log("Inside group");
});

errorBtns[9].addEventListener('click', () => {
    console.groupEnd();
    console.log("Group closed");
});
errorBtns[10].addEventListener('click', () =>
  console.table([{ name: "Alice" }, { name: "Bob" }])
);

errorBtns[11].addEventListener('click', () => console.time("Timer"));
errorBtns[12].addEventListener('click', () => console.timeEnd("Timer"));
errorBtns[13].addEventListener('click', () => console.trace("Trace demo"));

window.onerror = function(message) {
    console.log("Global error caught:", message);
};
errorBtns[14].addEventListener('click', () => {
    nonexistentFunction();
});
  </script>
</body>

</html>
